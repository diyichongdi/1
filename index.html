<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一重地 - 欢迎加入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 60px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .title {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #0088cc 0%, #0056b3 100%);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.3);
            margin-bottom: 30px;
        }
        
        .telegram-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 136, 204, 0.4);
        }
        
        .telegram-btn:active {
            transform: translateY(-1px);
        }
        
        .telegram-icon {
            font-size: 28px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }
        
        .feature-card {
            background: #f8f9fa;
            padding: 30px 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .feature-icon {
            font-size: 40px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .feature-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .feature-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .footer {
            margin-top: 60px;
            color: #999;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
            }
            
            .logo {
                font-size: 45px;
            }
            
            .title {
                font-size: 26px;
            }
            
            .subtitle {
                font-size: 16px;
            }
            
            .telegram-btn {
                padding: 15px 30px;
                font-size: 18px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo">🏆</div>
        <h1 class="title">第一重地</h1>
        <p class="subtitle">欢迎加入我们的Telegram社区，获取独家资源、最新资讯和专业指导</p>
        
        <a href="https://t.me/diyichongdi_2" target="_blank" class="telegram-btn">
            <span class="telegram-icon">📱</span>
            <span>立即加入Telegram</span>
        </a>
        
        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🎁</div>
                <h3 class="feature-title">独家资源</h3>
                <p class="feature-desc">获取社区专属的学习资料、工具和资源，助力快速成长</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">💬</div>
                <h3 class="feature-title">交流互动</h3>
                <p class="feature-desc">与志同道合的小伙伴一起交流经验、解决问题、共同进步</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">🚀</div>
                <h3 class="feature-title">最新资讯</h3>
                <p class="feature-desc">第一时间获取行业动态、技术趋势和赚钱机会</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">👨‍🏫</div>
                <h3 class="feature-title">专业指导</h3>
                <p class="feature-desc">获得专业人士的指导和建议，少走弯路，加速成功</p>
            </div>
        </div>
        
        <div class="footer">
            <p>期待在Telegram与你相遇！</p>
        </div>
    </div>
</body>
</html>
