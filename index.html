<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kingdom - 全能AI工具站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-active { border-bottom: 3px solid #667eea; color: #667eea; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="gradient-bg text-white py-8">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl font-bold mb-2">🤖 AI Kingdom</h1>
            <p class="text-lg opacity-90">全能AI工具站</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-8">
            <div class="flex border-b border-gray-200">
                <button onclick="switchTab('analyze')" id="tab-analyze" class="px-6 py-3 font-medium tab-active">
                    🐦 AI毒舌推特分析
                </button>
                <button onclick="switchTab('search')" id="tab-search" class="px-6 py-3 font-medium text-gray-500">
                    🔍 资源导航
                </button>
                <button onclick="switchTab('wallet')" id="tab-wallet" class="px-6 py-3 font-medium text-gray-500">
                    🔐 多签钱包
                </button>
            </div>
        </div>

        <div id="tab-analyze-content" class="tab-content">
            <div class="card p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">🐦 输入Twitter用户名开始分析</h2>
                <div class="flex gap-4 flex-wrap">
                    <input type="text" id="twitter-username" placeholder="@elonmusk" 
                           class="flex-1 min-w-[200px] px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    <select id="personality" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                        <option value="毒舌">毒舌</option>
                        <option value="温柔">温柔</option>
                        <option value="理性">理性</option>
                        <option value="幽默">幽默</option>
                    </select>
                    <button onclick="analyzeTwitter()" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                        开始分析 🚀
                    </button>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="setUsername('elonmusk')" class="px-3 py-1 bg-gray-100 rounded-full text-sm hover:bg-gray-200">elonmusk</button>
                    <button onclick="setUsername('sama')" class="px-3 py-1 bg-gray-100 rounded-full text-sm hover:bg-gray-200">sama</button>
                    <button onclick="setUsername('vitalikbuterin')" class="px-3 py-1 bg-gray-100 rounded-full text-sm hover:bg-gray-200">vitalikbuterin</button>
                </div>
            </div>
            <div id="analyze-result" class="card p-6 hidden">
                <div id="result-content" class="whitespace-pre-wrap"></div>
            </div>
        </div>

        <div id="tab-search-content" class="tab-content hidden">
            <div class="card p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">🔍 搜索资源</h2>
                <div class="flex gap-4">
                    <input type="text" id="search-query" placeholder="输入关键词..." 
                           class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500">
                    <button onclick="searchResources()" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                        搜索 🔍
                    </button>
                </div>
            </div>
            <div id="search-results" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
            </div>
            <div id="resources-list" class="mt-8">
            </div>
        </div>

        <div id="tab-wallet-content" class="tab-content hidden">
            <div class="card p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">🛡️ 创建多签钱包</h2>
                <div class="grid gap-4 md:grid-cols-2">
                    <div>
                        <label class="block text-sm font-medium mb-1">钱包名称</label>
                        <input type="text" id="wallet-name" placeholder="团队资金库" class="w-full px-4 py-2 border rounded-lg">
                        <label class="block text-sm font-medium mb-1 mt-4">签名阈值</label>
                        <input type="number" id="wallet-threshold" value="2" min="2" max="5" class="w-full px-4 py-2 border rounded-lg">
                        <label class="block text-sm font-medium mb-1 mt-4">所有者地址(逗号分隔)</label>
                        <input type="text" id="wallet-owners" placeholder="0x...,0x...,0x..." class="w-full px-4 py-2 border rounded-lg">
                        <button onclick="createWallet()" class="mt-4 w-full px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                            创建钱包 🆕
                        </button>
                    </div>
                    <div id="wallet-result" class="bg-gray-50 p-4 rounded-lg whitespace-pre-wrap"></div>
                </div>
            </div>
            <div class="card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">👁️ 我的钱包</h2>
                    <button onclick="viewWallets()" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">刷新</button>
                </div>
                <div id="wallets-list" class="bg-gray-50 p-4 rounded-lg whitespace-pre-wrap"></div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>© 2024 AI Kingdom - 全能AI工具站</p>
        </div>
    </footer>

    <script>
        const API_BASE = "https://admin23312-1.hf.space/api";

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                if (el.id !== `tab-${tab}`) el.classList.replace('tab-active', 'text-gray-500');
                else el.classList.replace('text-gray-500', 'tab-active');
            });
            document.getElementById(`tab-${tab}-content`).classList.remove('hidden');
            if (tab === 'search' && document.getElementById('resources-list').innerHTML === '') {
                loadResources();
            }
        }

        function setUsername(name) {
            document.getElementById('twitter-username').value = name;
        }

        async function analyzeTwitter() {
            const username = document.getElementById('twitter-username').value;
            const personality = document.getElementById('personality').value;
            const resultDiv = document.getElementById('analyze-result');
            const contentDiv = document.getElementById('result-content');

            if (!username) {
                alert('请输入用户名');
                return;
            }

            resultDiv.classList.remove('hidden');
            contentDiv.innerHTML = '<div class="loading">分析中...</div>';

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, personality })
                });
                const data = await response.json();
                
                if (data.error) {
                    contentDiv.innerHTML = `❌ ${data.error}`;
                } else {
                    contentDiv.innerHTML = `### ${data.analysis}`;
                }
            } catch (e) {
                contentDiv.innerHTML = `❌ 请求失败: ${e.message}`;
            }
        }

        async function loadResources() {
            try {
                const response = await fetch(`${API_BASE}/resources`);
                const data = await response.json();
                let html = '';
                for (const [category, items] of Object.entries(data)) {
                    html += `<h3 class="font-bold text-lg mt-6 mb-3">${category}</h3><div class="grid gap-2">`;
                    for (const item of items) {
                        html += `<a href="${item.url}" target="_blank" class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-gray-100">
                            <span>${item.name}</span>
                            <span class="text-gray-500 text-sm">- ${item.desc}</span>
                        </a>`;
                    }
                    html += '</div>';
                }
                document.getElementById('resources-list').innerHTML = html;
            } catch (e) {
                document.getElementById('resources-list').innerHTML = `<p class="text-red-500">加载失败: ${e.message}</p>`;
            }
        }

        async function searchResources() {
            const query = document.getElementById('search-query').value;
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="loading">搜索中...</div>';

            try {
                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();
                
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-gray-500">未找到结果</p>';
                    return;
                }

                resultsDiv.innerHTML = data.results.map(item => `
                    <div class="card p-4">
                        <div class="font-medium">${item.name}</div>
                        <div class="text-sm text-gray-500">${item.desc}</div>
                        <a href="${item.url}" target="_blank" class="text-purple-600 text-sm">访问 →</a>
                    </div>
                `).join('');
            } catch (e) {
                resultsDiv.innerHTML = `<p class="text-red-500">搜索失败: ${e.message}</p>`;
            }
        }

        async function createWallet() {
            const name = document.getElementById('wallet-name').value;
            const threshold = parseInt(document.getElementById('wallet-threshold').value);
            const owners = document.getElementById('wallet-owners').value;

            if (!name || !owners) {
                alert('请填写完整信息');
                return;
            }

            const resultDiv = document.getElementById('wallet-result');
            resultDiv.innerHTML = '创建中...';

            try {
                const response = await fetch(`${API_BASE}/wallet/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, threshold, owners })
                });
                const data = await response.json();
                resultDiv.innerHTML = data.result || data.error || JSON.stringify(data);
            } catch (e) {
                resultDiv.innerHTML = `创建失败: ${e.message}`;
            }
        }

        async function viewWallets() {
            const listDiv = document.getElementById('wallets-list');
            listDiv.innerHTML = '加载中...';

            try {
                const response = await fetch(`${API_BASE}/wallet/list`);
                const data = await response.json();
                listDiv.innerHTML = data.wallets?.length ? data.wallets.map(w => 
                    `【${w.name}】地址: ${w.address} 阈值: ${w.threshold}/${w.owners.length}`
                ).join('\n') : '暂无钱包';
            } catch (e) {
                listDiv.innerHTML = `加载失败: ${e.message}`;
            }
        }

        document.getElementById('twitter-username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeTwitter();
        });
        document.getElementById('search-query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchResources();
        });
    </script>
</body>
</html>
